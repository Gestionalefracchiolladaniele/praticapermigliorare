# BizQuery v0 — app FastAPI + Postgres locale (step 6 del piano).
#
# Avvio:
#   docker compose up --build          # avvia db + app
#   docker compose run --rm app python -m app.db.seed   # popola i dati (una volta)
#
# Lo schema.sql viene applicato AUTOMATICAMENTE da Postgres al primo avvio
# (script in docker-entrypoint-initdb.d), quindi tabelle+RLS+ruolo app esistono
# gia' quando il container db diventa healthy. Il seed va lanciato a mano perche'
# e' Python (genera dati random riproducibili), non SQL puro.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bizquery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Applica schema + RLS + crea il ruolo bizquery_app al primo boot.
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # l'app aspetta che Postgres accetti davvero connessioni, non solo che il
      # container sia "up": pg_isready e' il check corretto.
      test: ["CMD-SHELL", "pg_isready -U postgres -d bizquery"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Dentro la rete compose l'host del db e' il nome del servizio: 'db'.
      # App a runtime: ruolo NON-superuser => RLS applicata.
      DATABASE_URL: postgresql://bizquery_app:bizquery_app_pw@db:5432/bizquery
      # Seed/admin: superuser (crea tabelle). Usato solo da seed.py.
      DATABASE_URL_ADMIN: postgresql://postgres:postgres@db:5432/bizquery
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
    ports:
      - "8000:8000"

volumes:
  pgdata:
