# BizQuery v0 — app FastAPI + Postgres locale (step 6 del piano).
#
# Avvio:
#   docker compose up --build          # avvia db + app
#   docker compose run --rm app python -m app.db.seed   # popola i dati (una volta)
#
# Lo schema.sql viene applicato AUTOMATICAMENTE da Postgres al primo avvio
# (script in docker-entrypoint-initdb.d), quindi tabelle+RLS+ruolo app esistono
# gia' quando il container db diventa healthy. Il seed va lanciato a mano perche'
# e' Python (genera dati random riproducibili), non SQL puro.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bizquery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Legato al SOLO loopback: Postgres NON va mai pubblicato su 0.0.0.0 —
      # l'app lo raggiunge via rete interna Docker (host 'db'), qui la porta
      # serve solo per un eventuale `psql -h localhost` dall'host. Su 127.0.0.1
      # resta irraggiungibile da internet anche sulla EC2. (NB: le liste 'ports'
      # in compose si FONDONO tra base e override -> il binding sicuro va messo
      # QUI nel base, non si puo' "correggere" da un override.)
      - "127.0.0.1:5432:5432"
    volumes:
      # Applica schema + RLS + crea il ruolo bizquery_app al primo boot.
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # l'app aspetta che Postgres accetti davvero connessioni, non solo che il
      # container sia "up": pg_isready e' il check corretto.
      test: ["CMD-SHELL", "pg_isready -U postgres -d bizquery"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Dentro la rete compose l'host del db e' il nome del servizio: 'db'.
      # App a runtime: ruolo NON-superuser => RLS applicata.
      DATABASE_URL: postgresql://bizquery_app:bizquery_app_pw@db:5432/bizquery
      # Seed/admin: superuser (crea tabelle). Usato solo da seed.py.
      DATABASE_URL_ADMIN: postgresql://postgres:postgres@db:5432/bizquery
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      # Observability (Langfuse). Se vuote nel .env, il tracing resta disattivo.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
    ports:
      - "8000:8000"
    # NB: i volumi di sviluppo (montaggio del codice dal disco per l'hot-reload)
    # NON stanno piu' qui — sono in docker-compose.override.yml, che Compose carica
    # AUTOMATICAMENTE solo in locale. Motivo: le liste (ports/volumes) in un file
    # override si FONDONO col base, non lo sostituiscono -> se il montaggio
    # `./app:/app/app` fosse nel base, in cloud verrebbe montata una cartella
    # inesistente sopra il codice dell'immagine e l'app non partirebbe
    # (`Could not import module app.main`, verificato 2026-07-11). Cosi' il base
    # e' production-safe: usa il codice DENTRO l'immagine.

volumes:
  pgdata:
